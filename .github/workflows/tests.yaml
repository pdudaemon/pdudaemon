name: Run tests
on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
    tags:
      - "*"
  workflow_dispatch:
  pull_request:
  merge_group:
jobs:
  python-version-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ '3.10', '3.11', '3.12', '3.13', '3.14' ]
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Set Up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get -yq install pkg-config libsystemd-dev
      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip virtualenv
      - name: Install pdudaemon
        run: |
          pip install -e .
      - name: Test pdudaemon binary start
        run: |
          pdudaemon --help
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
      - name: Build container
        run: docker build -t pdudaemon-ci -f Dockerfile.dockerhub .
      - name: Run pytest
        run: docker run -v $(pwd):/p -w /p pdudaemon-ci /root/.local/pipx/venvs/pdudaemon/bin/pytest
      - name: Run functional tests
        run: docker run -v $(pwd):/p -w /p pdudaemon-ci sh -c "./share/pdudaemon-test.sh"
  tests-trixie:
    runs-on: ubuntu-latest
    steps:
      - name: check out repository code
        uses: actions/checkout@v6
      - name: Build container
        run: docker build --build-arg DEBIAN_VERSION=trixie -t pdudaemon-ci -f Dockerfile.dockerhub .
      - name: Run pytest
        run: docker run -v $(pwd):/p -w /p pdudaemon-ci /root/.local/share/pipx/venvs/pdudaemon/bin/pytest
      - name: Run functional tests
        run: docker run -v $(pwd):/p -w /p pdudaemon-ci sh -c "./share/pdudaemon-test.sh"

  build:
    needs:
      - tests
      - tests-trixie
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6
        with:
          # include tags and full history for setuptools_scm
          fetch-depth: 0
      - name: Install build deps
        run: python -m pip install -U build
      - name: Build package
        run: python -m build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  pypi-publish-test:
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/tags') || github.ref == 'refs/heads/main') }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish distribution package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  pypi-publish:
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags') }}
    needs: pypi-publish-test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish distribution package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
